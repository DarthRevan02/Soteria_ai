<!DOCTYPE html>
<html>
<head>
    <title>Scam Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Scam Detector</h2>

        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="alwaysOnToggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Always On</span>
        </div>

        <button id="scanBtn">Scan Now</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
